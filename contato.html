<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">


</head>
<body>
    <canvas class="tree" id="bg-canvas"></canvas>

    <header class="header">
        <a href="/" class="logo-link" title="Home">
            <svg viewBox="0 0 100 100" width="32" height="32">
                <path fill="currentColor" d="M50 10L10 50l40 40 40-40L50 10zm0 20l20 20-20 20-20-20 20-20z"/>
            </svg>
        </a>

        <nav class="nav">
            <div class="nav-right">
                <a href="projetos.html" title="Projetos">
                    <span class="text-label">Projetos</span>
                    <i class="ri-lightbulb-line icon-only"></i>
                </a>
                <a href="sobre.html" title="Sobre">
                    <span class="text-label">Sobre</span>
                    <i class="ri-article-line icon-only"></i>
                </a>
                <a href="contato.html" title="Contato">
                    <span class="text-label">Contato</span>
                    <i class="ri-mail-line icon-only"></i>
                </a>
                <a href="#" title="Novidades">
                    <span class="text-label">Novidades</span>
                    <i class="ri-global-line icon-only"></i>
                </a>
                <a href="https://github.com/Luiz-Ezequiel" target="_blank" class="hide-mobile">
                    <i class="ri-github-line" style="font-size: 1.2rem;"></i>
                </a>
                <a href="https://www.linkedin.com/in/luiz-ezequiel/" target="_blank" class="hide-mobile">
                    <i class="ri-linkedin-line" style="font-size: 1.2rem;"></i>
                </a>
                <button id="themeToggle" class="theme-btn" title="Toggle Theme">
                    <i class="ri-moon-line"></i>
                    <i class="ri-sun-line"></i>
                </button>
            </div>
        </nav>
    </header>

    <main>
        <div class="texto">
            <h1>Contato</h1>
        </div>

        <article>
            <div class="texto">
                <p>Quer trocar uma ideia, falar sobre projetos ou só dizer oi? Me manda uma mensagem.</p>

                <section>
                    <h2>Links</h2>
                    <ul class="contato-links">
                        <!-- <li>
                            <a href="mailto:ezequiel.luizedu@gmail.com">
                                <i class="ri-mail-line"></i>
                                ezequiel.luizedu@gmail.com
                            </a>
                        </li> -->
                        <li>
                            <a href="https://github.com/Luiz-Ezequiel" target="_blank">
                                <i class="ri-github-line"></i>
                                github.com/Luiz-Ezequiel
                            </a>
                        </li>
                        <li>
                            <a href="https://www.linkedin.com/in/luiz-ezequiel/" target="_blank">
                                <i class="ri-linkedin-line"></i>
                                linkedin.com/in/luiz-ezequiel
                            </a>
                        </li>
                    </ul>
                </section>

                <hr>

                <section>
                    <h2>Mensagem</h2>

                    <div class="form-group">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" placeholder="Seu nome">
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="seu@email.com">
                    </div>

                    <div class="form-group">
                        <label for="mensagem">Mensagem</label>
                        <textarea id="mensagem" placeholder="Escreva sua mensagem..."></textarea>
                    </div>

                    <button class="btn-send" id="btnEnviar">
                        <i class="ri-send-plane-line"></i>
                        Enviar
                    </button>

                    <p class="form-feedback" id="formFeedback"></p>
                </section>
            </div>
        </article>
    </main>

    <footer class="copyright">
        <span class="copyright-text">
            2026 © Luiz Eduardo Oliveira Ezequiel
        </span>
    </footer>

    <script src="js/bg-tree.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
